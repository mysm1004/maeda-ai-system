<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1040">
<title>Banner Pattern 3</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{margin:0;width:1040px;height:1040px;overflow:hidden;font-family:'Noto Sans JP',sans-serif;background:#0A0A0A}
.banner{width:1040px;height:1040px;position:relative;overflow:hidden;background:linear-gradient(160deg,#0A0A0A 0%,#141414 35%,#1A1A1A 65%,#0A0A0A 100%);display:flex}
.left{flex:1;display:flex;flex-direction:column;justify-content:center;padding:50px 40px 50px 60px;position:relative;z-index:3}
.right{width:420px;position:relative;display:flex;align-items:flex-end;justify-content:center;gap:12px;padding:0 30px 0 0;z-index:2}
.right::before{content:'';position:absolute;left:0;top:0;bottom:0;width:120px;background:linear-gradient(90deg,#0A0A0A,transparent);z-index:3}
.photo-col{display:flex;flex-direction:column;gap:12px;align-items:center}
.photo-wrap{border-radius:10px;overflow:hidden;border:1px solid rgba(196,162,101,0.2);box-shadow:0 4px 20px rgba(0,0,0,0.5)}
.photo-wrap img{display:block;width:170px;height:226px;object-fit:cover;object-position:top center}
.photo-wrap.main{border:2px solid rgba(196,162,101,0.5)}
.photo-wrap.main img{width:185px;height:247px}
.top-line{position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,#C4A265 20%,#D4B478 50%,#C4A265 80%,transparent)}
.bot-line{position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,#C4A265 20%,#D4B478 50%,#C4A265 80%,transparent)}
.glow{position:absolute;top:0;left:30%;width:400px;height:400px;background:radial-gradient(circle,rgba(196,162,101,0.04) 0%,transparent 70%);pointer-events:none}
.logo{height:30px;filter:brightness(100);margin-bottom:24px}
.en-label{color:#C4A265;font-size:12px;letter-spacing:0.35em;margin-bottom:6px;font-weight:500}
.target{color:rgba(255,255,255,0.5);font-size:14px;letter-spacing:0.1em;margin-bottom:20px}
.gold-line{width:40px;height:1px;background:#C4A265;margin-bottom:12px}
.catch{font-family:'Noto Serif JP',serif;font-size:60px;font-weight:700;color:#fff;letter-spacing:0.04em;line-height:1.4;margin-bottom:12px;text-shadow:0 2px 8px rgba(0,0,0,0.3)}
.sub{color:rgba(255,255,255,0.6);font-size:15px;letter-spacing:0.06em;margin-bottom:24px;line-height:1.8}
.badge{border:2px solid #C4A265;border-radius:10px;padding:14px 32px;display:inline-block;background:rgba(196,162,101,0.06);margin-bottom:16px}
.badge-top{color:#C4A265;font-size:18px;font-weight:700;letter-spacing:0.08em}
.badge-num{font-size:80px;font-weight:900;background:linear-gradient(135deg,#D4B478,#C4A265);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.1}
.badge-sub{color:rgba(255,255,255,0.45);font-size:14px;margin-top:2px}
.badge-sub s{color:rgba(255,255,255,0.3)}
.period{color:#C4A265;font-size:13px;letter-spacing:0.15em;margin-bottom:20px}
.tags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.tag{border:1px solid rgba(255,255,255,0.2);border-radius:16px;padding:4px 12px;color:rgba(255,255,255,0.6);font-size:12px}
.cta{display:inline-block;background:linear-gradient(135deg,#D4B478,#C4A265,#A88B4A);color:#0D1B2A;font-size:18px;font-weight:700;padding:14px 40px;border-radius:50px;letter-spacing:0.08em;box-shadow:0 4px 20px rgba(196,162,101,0.35);margin-bottom:16px}
.firm{color:rgba(255,255,255,0.35);font-size:12px;letter-spacing:0.1em}
.referral{color:#E8B4B8;font-size:12px;letter-spacing:0.06em;margin-bottom:20px;padding:6px 14px;border:1px solid rgba(212,160,167,0.25);border-radius:6px;display:inline-block;background:rgba(212,160,167,0.06)}
</style>
</head>
<body>

  <div class="top-line"></div><div class="bot-line"></div>
  <div class="glow"></div>
