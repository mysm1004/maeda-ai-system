<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>春キャンペーン LINEバナー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Noto+Serif+JP:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #f0f0f0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'Noto Sans JP', sans-serif;
  padding: 20px;
}
.banner-wrapper {
  width: 100%;
  max-width: 520px;
}
.banner-label {
  font-size: 12px;
  color: #888;
  margin-bottom: 8px;
  text-align: center;
}

/* ============================================================
   BANNER 1: メイン訴求バナー（リッチメッセージ向け 1040x1040）
   ============================================================ */
.banner-main {
  position: relative;
  width: 100%;
  aspect-ratio: 1040 / 1300;
  border-radius: 16px;
  overflow: hidden;
  cursor: pointer;
  box-shadow: 0 4px 24px rgba(0,0,0,0.12);
  background: linear-gradient(155deg, #FFF8F5 0%, #FFF0EB 30%, #FFE8E0 60%, #F8D8D0 100%);
}
.banner-main::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 15% 20%, rgba(232,180,188,0.3) 0%, transparent 50%),
    radial-gradient(circle at 85% 70%, rgba(199,125,138,0.2) 0%, transparent 40%),
    radial-gradient(circle at 50% 90%, rgba(199,125,138,0.15) 0%, transparent 50%);
  z-index: 1;
}

/* 桜の花びら装飾 */
.sakura {
  position: absolute;
  z-index: 2;
  opacity: 0.5;
}
.sakura-1 { top: 5%; left: 8%; width: 32px; height: 32px; transform: rotate(15deg); }
.sakura-2 { top: 12%; right: 12%; width: 24px; height: 24px; transform: rotate(-30deg); }
.sakura-3 { bottom: 25%; left: 5%; width: 28px; height: 28px; transform: rotate(45deg); }
.sakura-4 { top: 35%; right: 6%; width: 20px; height: 20px; transform: rotate(-15deg); }
.sakura-5 { bottom: 8%; right: 15%; width: 26px; height: 26px; transform: rotate(60deg); }
.sakura-6 { top: 55%; left: 12%; width: 18px; height: 18px; transform: rotate(-45deg); }
.sakura svg { width: 100%; height: 100%; }

.banner-content {
  position: relative;
  z-index: 3;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  padding: 5% 6% 4%;
  text-align: center;
}

.banner-logo {
  position: absolute;
  top: 4%;
  right: 5%;
  width: clamp(90px, 25%, 140px);
  z-index: 5;
}
.banner-logo img {
  width: 100%;
  height: auto;
}

.banner-top-tag {
  display: inline-block;
  background: linear-gradient(135deg, #C77D8A, #B06A75);
  color: #fff;
  font-size: clamp(10px, 2.5vw, 12px);
  font-weight: 700;
  letter-spacing: 0.15em;
  padding: 5px 18px;
  border-radius: 20px;
  margin-bottom: 3%;
}

.banner-headline-sub {
  font-family: 'Noto Serif JP', serif;
  font-size: clamp(13px, 3.2vw, 17px);
  font-weight: 500;
  color: rgba(45,31,26,0.7);
  letter-spacing: 0.1em;
  margin-bottom: 2%;
}

.banner-headline {
  font-family: 'Noto Serif JP', serif;
  font-size: clamp(22px, 6.5vw, 34px);
  font-weight: 700;
  color: #2D1F1A;
  letter-spacing: 0.05em;
  line-height: 1.35;
  margin-bottom: 3%;
}
.banner-headline em {
  font-style: normal;
  color: #B06A75;
}

.banner-offer-box {
  background: rgba(255,255,255,0.85);
  border: 2px solid rgba(199,125,138,0.3);
  border-radius: 16px;
  padding: 4% 6%;
  margin-bottom: 3%;
  width: 90%;
}
.banner-offer-label {
  font-size: clamp(11px, 2.5vw, 14px);
  color: rgba(45,31,26,0.6);
  font-weight: 500;
  margin-bottom: 4px;
}
.banner-offer-main {
  display: flex;
  align-items: baseline;
  justify-content: center;
  gap: 4px;
}
.banner-offer-main .num {
  font-family: 'Noto Serif JP', serif;
  font-size: clamp(40px, 12vw, 64px);
  font-weight: 700;
  color: #B06A75;
  line-height: 1;
}
.banner-offer-main .unit {
  font-family: 'Noto Serif JP', serif;
  font-size: clamp(18px, 5vw, 28px);
  font-weight: 600;
  color: #B06A75;
}
.banner-offer-main .free {
  font-size: clamp(14px, 3.5vw, 20px);
  font-weight: 700;
  color: #2D1F1A;
  margin-right: 4px;
}
.banner-offer-note {
  font-size: clamp(10px, 2.2vw, 12px);
  color: rgba(45,31,26,0.5);
  margin-top: 4px;
}

.banner-deadline {
  font-size: clamp(12px, 3vw, 16px);
  font-weight: 700;
  color: #2D1F1A;
  letter-spacing: 0.08em;
  margin-bottom: 3%;
  padding: 3px 14px;
  border-bottom: 2px solid rgba(199,125,138,0.4);
}
.banner-deadline span {
  color: #B06A75;
}

.banner-cta {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  background: linear-gradient(135deg, #D4939E 0%, #C77D8A 40%, #B06A75 100%);
  color: #fff;
  font-size: clamp(14px, 3.5vw, 18px);
  font-weight: 700;
  letter-spacing: 0.08em;
  padding: 12px 28px;
  border-radius: 50px;
  box-shadow: 0 4px 16px rgba(199,125,138,0.4);
  width: 80%;
  max-width: 300px;
}
.banner-cta svg {
  width: 18px;
  height: 18px;
  flex-shrink: 0;
}

.banner-office {
  margin-top: 4%;
  font-size: clamp(10px, 2.2vw, 12px);
  color: rgba(45,31,26,0.45);
  letter-spacing: 0.05em;
}

/* ============================================================
   BANNER 2: カード型バナー（トーク画面向け 1040x520）
   ============================================================ */
.banner-card {
  position: relative;
  width: 100%;
  aspect-ratio: 2 / 1;
  border-radius: 16px;
  overflow: hidden;
  cursor: pointer;
  box-shadow: 0 4px 24px rgba(0,0,0,0.12);
  background: linear-gradient(135deg, #FFF8F5 0%, #FFE8E0 50%, #F8D0C8 100%);
  margin-top: 40px;
}
.banner-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 20% 30%, rgba(232,180,188,0.35) 0%, transparent 50%),
    radial-gradient(circle at 80% 60%, rgba(199,125,138,0.2) 0%, transparent 45%);
  z-index: 1;
}

.card-content {
  position: relative;
  z-index: 3;
  display: flex;
  height: 100%;
}
.card-left {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 6% 2% 6% 6%;
}
.card-right {
  width: 38%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 4% 4% 4% 0;
}

.card-tag {
  display: inline-flex;
  align-self: flex-start;
  background: linear-gradient(135deg, #C77D8A, #B06A75);
  color: #fff;
  font-size: clamp(8px, 2vw, 11px);
  font-weight: 700;
  letter-spacing: 0.12em;
  padding: 4px 12px;
  border-radius: 12px;
  margin-bottom: 8%;
}
.card-headline {
  font-family: 'Noto Serif JP', serif;
  font-size: clamp(16px, 4.5vw, 24px);
  font-weight: 700;
  color: #2D1F1A;
  line-height: 1.4;
  letter-spacing: 0.03em;
  margin-bottom: 6%;
}
.card-headline em {
  font-style: normal;
  color: #B06A75;
}
.card-sub {
  font-size: clamp(9px, 2vw, 11px);
  color: rgba(45,31,26,0.55);
  letter-spacing: 0.05em;
}

.card-offer {
  background: rgba(255,255,255,0.8);
  border: 1.5px solid rgba(199,125,138,0.25);
  border-radius: 12px;
  padding: 12% 8%;
  text-align: center;
  width: 100%;
}
.card-offer-label {
  font-size: clamp(9px, 2vw, 11px);
  color: rgba(45,31,26,0.5);
  font-weight: 500;
  margin-bottom: 2px;
}
.card-offer-num {
  font-family: 'Noto Serif JP', serif;
  font-size: clamp(32px, 9vw, 48px);
  font-weight: 700;
  color: #B06A75;
  line-height: 1.1;
}
.card-offer-num span {
  font-size: 50%;
}
.card-offer-note {
  font-size: clamp(8px, 1.8vw, 10px);
  color: rgba(45,31,26,0.45);
  margin-top: 4px;
}
.card-cta-mini {
  margin-top: 8%;
  background: linear-gradient(135deg, #D4939E 0%, #C77D8A 40%, #B06A75 100%);
  color: #fff;
  font-size: clamp(9px, 2.2vw, 12px);
  font-weight: 700;
  letter-spacing: 0.05em;
  padding: 6px 16px;
  border-radius: 20px;
  display: flex;
  align-items: center;
  gap: 4px;
}
.card-cta-mini svg {
  width: 12px;
  height: 12px;
}

/* 桜 on card */
.card-sakura {
  position: absolute;
  z-index: 2;
  opacity: 0.4;
}
.card-sakura-1 { top: 8%; right: 42%; width: 20px; height: 20px; transform: rotate(20deg); }
.card-sakura-2 { bottom: 12%; left: 8%; width: 16px; height: 16px; transform: rotate(-25deg); }
.card-sakura-3 { top: 15%; left: 25%; width: 14px; height: 14px; transform: rotate(50deg); }
</style>
</head>

<script>
// ロゴの白背景を透過処理
document.querySelectorAll('.banner-logo img').forEach(function(img) {
  function removeWhiteBg() {
    var canvas = document.createElement('canvas');
    var ctx = canvas.getContext('2d');
    canvas.width = img.naturalWidth;
    canvas.height = img.naturalHeight;
    ctx.drawImage(img, 0, 0);
    var imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    var data = imageData.data;
    for (var i = 0; i < data.length; i += 4) {
      var r = data[i], g = data[i+1], b = data[i+2];
      // 白〜薄グレー判定（RGB全てが220以上）
      if (r > 220 && g > 220 && b > 220) {
        var brightness = (r + g + b) / 3;
        // 明るいほど透明に
        data[i+3] = Math.max(0, Math.round((255 - brightness) * 6));
      }
    }
    ctx.putImageData(imageData, 0, 0);
    img.src = canvas.toDataURL('image/png');
  }
  if (img.complete && img.naturalWidth > 0) {
    removeWhiteBg();
  } else {
    img.onload = removeWhiteBg;
  }
});
</script>
